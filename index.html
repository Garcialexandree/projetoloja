<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empório Colonial</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #fdfaf5;
    font-family: Arial;
}

/* NAVBAR */
.navbar {
    background: #fff;
    transition: .3s;
}
.navbar.scrolled {
    box-shadow: 0 2px 15px rgba(0,0,0,0.2);
}

/* HERO */
.hero {
    height: 300px;
    background: url('https://images.unsplash.com/photo-1600891964092-4316c288032e') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    position: relative;
    background-attachment: fixed;
}
.hero::before {
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.4);
}
.hero h1 {
    position:relative;
    z-index:2;
}

/* FILTROS */
.btn-filtro {
    border-radius: 30px;
    padding: 10px 18px;
    margin: 5px;
    border: 1px solid #ddd;
    background: white;
    transition: 0.3s;
}
.btn-filtro.active {
    background: #b8860b;
    color: white;
    transform: scale(1.1);
}

/* CARD */
.card-produto {
    border:none;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.card-produto:hover {
    transform: translateY(-5px);
}
.img-container {
    height:180px;
    overflow:hidden;
}
.img-container img {
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.3s;
}
.card-produto:hover img {
    transform: scale(1.1);
}
.preco {
    color:#b8860b;
    font-weight:bold;
}

/* ANIMAÇÃO */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}
.pulse {
    animation: pulse 0.3s;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar sticky-top p-3 d-flex justify-content-between">

<h4>🌿 Empório Colonial</h4>

<button id="btnCart" class="btn btn-success position-relative" onclick="abrirCarrinho()">
🛒
<span id="qtdTop"
class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
0
</span>
</button>

</nav>

<!-- HERO -->
<header class="hero">
<h1>Sabor do Campo</h1>
</header>

<div class="container mt-4">

<div id="filtros" class="text-center mb-4"></div>

<div class="row" id="produtos"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalCarrinho">
<div class="modal-dialog">
<div class="modal-content p-3">
<h4>Carrinho</h4>
<div id="lista"></div>
<h5 id="total"></h5>
<button class="btn btn-success w-100" onclick="enviarWhatsApp()">Finalizar Pedido</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* DADOS */
const categorias = {
todos:{nome:"🍽️ Todos"},
queijo:{nome:"🧀 Queijos"},
salame:{nome:"🥩 Salame"},
vinho:{nome:"🍷 Vinhos"},
doce:{nome:"🍰 Doces"}
};

const produtos = [
{id:1,nome:"Queijo Colonial",categoria:"queijo",preco:45,img:"https://cdn0.tudoreceitas.com/pt/posts/4/7/9/queijo_colonial_caseiro_9974_orig.jpg"},
{id:2,nome:"Salame Italiano",categoria:"salame",preco:39,img:"https://charcutaria.org/wp-content/uploads/2023/04/salame-finocchiona-scaled.jpg"},
{id:3,nome:"Vinho Colonial",categoria:"vinho",preco:65,img:"https://tse4.mm.bing.net/th/id/OIP.Xhpen0CK-gKCPhi_sIX3ngHaE8"},
{id:4,nome:"Doce de Leite",categoria:"doce",preco:20,img:"https://cidadeolimpica.com.br/wp-content/uploads/2023/08/doce-de-leite-caseiro.jpg"}
];

let carrinho=[];

/* INICIAR */
function carregar(){
let filtros='';

Object.keys(categorias).forEach(cat=>{
filtros += `
<button class="btn-filtro ${cat==='todos'?'active':''}" onclick="filtrar('${cat}',event)">
${categorias[cat].nome}
</button>`;
});

document.getElementById("filtros").innerHTML=filtros;

mostrarProdutos(produtos);
}

/* PRODUTOS */
function mostrarProdutos(lista){
let html='';

lista.forEach(p=>{
html+=`
<div class="col-6 col-md-3 mb-4">
<div class="card-produto text-center">

<div class="img-container">
<img src="${p.img}">
</div>

<div class="p-2">
<h6>${p.nome}</h6>
<p class="preco">R$ ${p.preco}</p>

<div class="d-flex justify-content-center gap-2">
<button class="btn btn-danger btn-sm" onclick="alterarQtd(${p.id},-1)">-</button>
<span id="qtd-${p.id}">0</span>
<button class="btn btn-success btn-sm" onclick="alterarQtd(${p.id},1)">+</button>
</div>

</div>
</div>
</div>`;
});

document.getElementById("produtos").innerHTML=html;
}

/* FILTRO */
function filtrar(cat,e){
document.querySelectorAll('.btn-filtro').forEach(b=>b.classList.remove('active'));
e.currentTarget.classList.add('active');

if(cat==="todos") return mostrarProdutos(produtos);

mostrarProdutos(produtos.filter(p=>p.categoria===cat));
}

/* CARRINHO */
function alterarQtd(id,delta){
let item=carrinho.find(i=>i.id===id);

if(item){
item.qtd+=delta;
if(item.qtd<=0){
carrinho=carrinho.filter(i=>i.id!==id);
}
}else if(delta>0){
let p=produtos.find(p=>p.id===id);
carrinho.push({...p,qtd:1});
}

animarCarrinho();
atualizar();
}

/* ATUALIZAR */
function atualizar(){
let total=0,qtdTotal=0,lista='';

carrinho.forEach(i=>{
total+=i.preco*i.qtd;
qtdTotal+=i.qtd;
lista+=`<p>${i.nome} x${i.qtd}</p>`;
});

document.getElementById("lista").innerHTML=lista;
document.getElementById("total").innerText="Total: R$ "+total;
document.getElementById("qtdTop").innerText=qtdTotal;

produtos.forEach(p=>{
let item=carrinho.find(i=>i.id===p.id);
document.getElementById(`qtd-${p.id}`).innerText=item?item.qtd:0;
});
}

/* ANIMAÇÃO */
function animarCarrinho(){
const btn=document.getElementById("btnCart");
btn.classList.add("pulse");
setTimeout(()=>btn.classList.remove("pulse"),300);
}

/* MODAL */
function abrirCarrinho(){
new bootstrap.Modal(document.getElementById('modalCarrinho')).show();
}

/* WHATSAPP */
function enviarWhatsApp(){
let msg="Pedido:%0A";

carrinho.forEach(i=>{
msg+=`${i.nome} x${i.qtd}%0A`;
});

window.open(`https://wa.me/5541989013747?text=${msg}`);
}

/* SCROLL */
window.addEventListener("scroll",()=>{
const nav=document.querySelector(".navbar");
nav.classList.toggle("scrolled",window.scrollY>50);
});

carregar();

</script>

</body>
</html>
